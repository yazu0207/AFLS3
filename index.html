<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>AFLSⅢ Tool</title>
<style>
body { font-family: sans-serif; background:#0b1020; color:#fff; padding:20px }
h2,h3{margin:10px 0}
button { padding:8px 12px; margin:5px }
.container{display:flex; gap:40px; align-items:flex-start}
.block{margin-bottom:20px}
table { border-collapse: collapse; margin:10px 0 }
td { width:45px; height:45px; text-align:center; border:1px solid #333 }
.hot { background:#8b0000 }
.cold { background:#1c2a44 }
.resultTable td{background:#111}
</style>
</head>
<body>

<h2>AFLSⅢ Tool</h2>

<div class="container">
  <div class="block">
    <h3>AFLS出力データ</h3>
    <input type="file" id="aflsCsv">
  </div>

  <div class="block">
    <h3>ヒートマップデータ</h3>
    <input type="file" id="heatmapCsv">
  </div>
</div>

<button id="runBtn">再構築</button>
<button id="exportBtn">CSV保存</button>

<h3>ヒートマップ</h3>
<div id="heatmap"></div>

<h3>結果（マトリックス表示）</h3>
<div id="output"></div>

<h3>履歴</h3>
<pre id="history"></pre>

<script type="module">
import { reconstructAFLS } from './afls3_reconstructor.js'

const aflsInput = document.getElementById('aflsCsv')
const heatmapInput = document.getElementById('heatmapCsv')
const heatmapDiv = document.getElementById('heatmap')
const output = document.getElementById('output')
const historyDiv = document.getElementById('history')

let latestResult = null
let history = []

function readFile(file){
  return new Promise(r=>{
    const fr = new FileReader()
    fr.onload=e=>r(e.target.result)
    fr.readAsText(file)
  })
}

function renderHeatmap(cells){
  if(!cells) return
  heatmapDiv.innerHTML = ''
  const table = document.createElement('table')

  for(let y=0;y<5;y++){
    const tr=document.createElement('tr')
    for(let x=0;x<7;x++){
      const td=document.createElement('td')
      const c = cells.find(v=>v.x===x && v.y===y)
      if(!c) continue

      td.textContent = c.rank
      td.className = c.zone === 'HOT' ? 'hot':'cold'
</html>
