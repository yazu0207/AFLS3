<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AFLSⅢ Tool</title>
<style>
body {
  font-family: sans-serif;
  background:#0b1020;
  color:#fff;
  padding:15px;
}

h2,h3{margin:10px 0}

/* ボタン大きく */
button {
  padding:12px 16px;
  margin:5px;
  font-size:16px;
  border-radius:8px;
  border:none;
  cursor:pointer;
}

/* レイアウト */
.container{
  display:flex;
  gap:40px;
  align-items:flex-start;
}

/* スマホ対応 */
@media (max-width: 768px){
  .container{
    flex-direction:column;
    gap:10px;
  }
}

/* ブロック */
.block{
  margin-bottom:20px;
}

/* テーブル */
table {
  border-collapse: collapse;
  margin:10px 0;
  width:100%;
  max-width:100%;
}

td {
  width:14%;
  height:40px;
  text-align:center;
  border:1px solid #333;
  font-size:14px;
}

/* 色 */
.hot { background:#8b0000 }
.cold { background:#1c2a44 }

/* スマホでスクロール可能に */
#heatmap, #output {
  overflow-x:auto;
}

/* 結果表示を見やすく */
#output p{
  background:#111;
  padding:8px;
  border-radius:6px;
  margin:5px 0;
  font-size:14px;
}
</style>
</head>
<body>

<h2>AFLSⅢ Tool</h2>

<div class="container">
  <div class="block">
    <h3>AFLS出力データ</h3>
    <input type="file" id="aflsCsv">
  </div>

  <div class="block">
    <h3>ヒートマップデータ</h3>
    <input type="file" id="heatmapCsv">
  </div>
</div>

<button id="runBtn">再構築</button>
<button id="exportBtn">CSV保存</button>

<h3>ヒートマップ</h3>
<div id="heatmap"></div>

<h3>結果（マトリックス表示）</h3>
<div id="output"></div>

<h3>履歴</h3>
<pre id="history"></pre>

<script type="module">
import { reconstructAFLS } from './afls3_reconstructor.js'

const aflsInput = document.getElementById('aflsCsv')
const heatmapInput = document.getElementById('heatmapCsv')
const heatmapDiv = document.getElementById('heatmap')
const output = document.getElementById('output')
const historyDiv = document.getElementById('history')
const runBtn = document.getElementById('runBtn')
const exportBtn = document.getElementById('exportBtn')

let latestResult = null
let history = []

function readFile(file){
  return new Promise(r=>{
    const fr = new FileReader()
    fr.onload=e=>r(e.target.result)
    fr.readAsText(file)
  })
}

function renderHeatmap(cells){
  if(!cells) return
  heatmapDiv.innerHTML = ''
  const table = document.createElement('table')

  for(let y=0;y<5;y++){
    const tr=document.createElement('tr')
    for(let x=0;x<7;x++){
      const td=document.createElement('td')
      const c = cells.find(v=>v.x===x && v.y===y)
      if(c){
        td.textContent = c.rank
        td.className = c.zone === 'HOT' ? 'hot':'cold'
      }
      tr.appendChild(td)
    }
    table.appendChild(tr)
  }

  heatmapDiv.appendChild(table)
}

runBtn.addEventListener('click', async () => {
  if (!aflsInput.files[0] || !heatmapInput.files[0]) {
    alert("CSVを両方選択してください")
    return
  }

  const aflsText = await readFile(aflsInput.files[0])
  const heatText = await readFile(heatmapInput.files[0])

  const result = reconstructAFLS(aflsText, heatText)

  latestResult = result
  history.push(result.groups)

  renderHeatmap(result.heatmap)

  output.innerHTML = result.groups
    .map((g,i)=>`<p>G${i+1}: ${g.join(', ')}</p>`)
    .join('')

  historyDiv.textContent = JSON.stringify(history, null, 2)
})

exportBtn.addEventListener('click', () => {
  if (!latestResult) {
    alert("先に再構築してください")
    return
  }

  const csv = latestResult.groups.map(g=>g.join(',')).join('\n')
  const blob = new Blob([csv], {type:'text/csv'})
  const url = URL.createObjectURL(blob)

  const a = document.createElement('a')
  a.href = url
  a.download = 'afls_result.csv'
  a.click()

  URL.revokeObjectURL(url)
})
</script>

</body>
</html>
